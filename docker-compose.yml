services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: flyjustice-lite-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong!Passw0rd" -C -Q "SELECT 1" || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "YourStrong!Passw0rd" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 12

  web:
    build: .
    container_name: flyjustice-lite-web
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=FlyJusticeLite;User Id=sa;Password=YourStrong!Passw0rd;Encrypt=True;TrustServerCertificate=True;MultipleActiveResultSets=true"
      Database__ApplyMigrationsOnStartup: "true"
      Database__SeedSampleData: "true"
      Site__PublicBaseUrl: "http://localhost:8080"
    ports:
      - "8080:8080"
    volumes:
      - claim-uploads:/app/wwwroot/uploads/claims

volumes:
  sqlserver-data:
  claim-uploads:
